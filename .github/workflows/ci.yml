name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install workspace dependencies
        run: npm ci

      - name: Run backend tests
        run: npm run test -w @chaincfo/backend

      - name: Build backend
        run: npm run build -w @chaincfo/backend

      - name: Build frontend
        run: npm run build -w @chaincfo/frontend
